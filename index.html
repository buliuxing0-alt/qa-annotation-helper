<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标注工具 v6.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1a1a2e;line-height:1.6}
.header{background:linear-gradient(135deg,#ff2442,#ff6b81);color:#fff;padding:20px 32px}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:12px;opacity:.9}
.container{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.panel{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.panel-header{padding:14px 20px;border-bottom:1px solid #e8e8e8;font-size:15px;font-weight:600}
.panel-body{padding:20px}
textarea{width:100%;padding:9px 11px;border:1px solid #e8e8e8;border-radius:6px;font-size:13px;background:#fafafa;resize:vertical;min-height:50px;font-family:inherit}
textarea:focus{outline:none;border-color:#ff2442;background:#fff}
label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.hint{font-weight:400;color:#999;font-size:11px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:#ff2442;color:#fff}
.btn-primary:hover{background:#e6203c}
.btn-secondary{background:#f0f0f0;color:#1a1a2e}
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.hint-box{background:#e6f7ff;padding:8px 12px;border-radius:6px;font-size:11px;color:#1890ff;margin-bottom:12px;line-height:1.5}
.output-box{background:#fafafa;border:1px solid #e8e8e8;border-radius:6px;padding:14px;font-family:"SF Mono",Consolas,monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:500px;overflow-y:auto}
.result-area{min-height:200px}
.result-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#ccc;text-align:center}
.tabs{display:flex;border-bottom:1px solid #e8e8e8}
.tab{padding:12px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#666;font-weight:500;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#ff2442;border-bottom-color:#ff2442;font-weight:600}
.tab-content{display:none}.tab-content.active{display:block}
.debug-box{background:#fffbe6;border:1px solid #faad14;border-radius:6px;padding:14px;margin-bottom:16px;font-family:"SF Mono",Consolas,monospace;font-size:12px;line-height:1.7;max-height:300px;overflow-y:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}
.badge-a{background:#e6f7ff;color:#1890ff}
.badge-b{background:#f6ffed;color:#52c41a}
.badge-d{background:#fff7e6;color:#fa8c16}
.badge-e{background:#f9f0ff;color:#722ed1}
@media(max-width:768px){.container{grid-template-columns:1fr;padding:12px}}
</style>
</head>
<body>
<div class="header">
<h1>📝 标注工具 v6.3</h1>
<p>粘贴表格 → 查看调试 → 格式化输出</p>
</div>
<div class="container">
<div class="panel">
<div class="tabs">
<button class="tab active" onclick="switchTab('format')">📋 表格格式化</button>
<button class="tab" onclick="switchTab('guide')">📖 指南</button>
</div>

<div class="tab-content active" id="tab-format">
<div class="panel-body">
<div class="hint-box">
💡 在表格里选中所有行 → Ctrl+C 复制 → 粘贴到下方 → 点「格式化」
</div>
<label>粘贴表格数据 <span class="hint">（直接从 Excel/Google Sheets 复制）</span></label>
<textarea id="tableInput" rows="10" placeholder="题目类型	问题序号	提问时间点	回答参考时间点	问题	回答	题目解析
A	1	0:04:17		画面中猫小弟...	不是的...	画面中猫小弟的鱼竿是..."></textarea>
<div class="btn-group">
<button class="btn btn-primary" onclick="formatTable()">📋 格式化</button>
<button class="btn btn-secondary" onclick="document.getElementById('tableInput').value=''">清空</button>
</div>
</div>
</div>

<div class="tab-content" id="tab-guide">
<div class="panel-body" style="max-height:600px;overflow-y:auto">
<div style="margin-bottom:16px"><h4 style="font-size:13px;margin-bottom:8px">各类型核心结构</h4>
<div style="background:#fafafa;padding:8px 12px;border-radius:4px;font-size:12px;margin:6px 0;border-left:3px solid #ff2442"><strong><span class="badge badge-a">A</span> 实时多模态感知</strong><br>声音X + 画面Y → 关联判断</div>
<div style="background:#fafafa;padding:8px 12px;border-radius:4px;font-size:12px;margin:6px 0;border-left:3px solid #ff2442"><strong><span class="badge badge-b">B</span> 历史回顾</strong><br>当前 vs 早期 → 对比（≥5分钟）</div>
<div style="background:#fafafa;padding:8px 12px;border-radius:4px;font-size:12px;margin:6px 0;border-left:3px solid #ff2442"><strong><span class="badge badge-d">D</span> 工具调用</strong><br>画面事物 + 历史回顾 + 外部搜索</div>
<div style="background:#fafafa;padding:8px 12px;border-radius:4px;font-size:12px;margin:6px 0;border-left:3px solid #ff2442"><strong><span class="badge badge-e">E</span> 主动交互</strong><br>事件触发 → 复述（10分钟内）</div>
</div>
</div>
</div>
</div>

<div class="panel">
<div class="panel-header">📤 输出</div>
<div class="panel-body result-area" id="resultArea">
<div class="result-empty"><div style="font-size:40px;margin-bottom:10px">📋</div><p>粘贴表格数据<br>点击「格式化」</p></div>
</div>
</div>
</div>

<script>
function switchTab(name){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+name).classList.add('active');
}

function isTime(s){return /^\d{1,2}:\d{2}(:\d{2})?$/.test(s.trim());}
function isType(s){return /^[abdeABDE]$/.test(s.trim());}
function isNum(s){return /^\d+$/.test(s.trim());}

function formatTable(){
const raw=document.getElementById('tableInput').value.trim();
if(!raw){alert('请先粘贴数据');return;}
const lines=raw.split('\n').filter(l=>l.trim());

// Debug: show raw data structure
let debug='【调试信息】原始数据解析\n';
debug+='═══════════════════════════════════\n\n';

// Check first non-header line
let startIdx=0;
const hFields=lines[0].split('\t');
if(hFields.some(f=>/题目类型|问题序号|提问时间|回答参考|题目解析/.test(f))){startIdx=1;}

debug+=`表头(${hFields.length}列): ${hFields.join(' | ')}\n\n`;

// Show first 3 data rows
for(let i=startIdx;i<Math.min(startIdx+3,lines.length);i++){
const fields=lines[i].split('\t');
debug+=`第${i+1}行: ${fields.length} 个字段\n`;
fields.forEach((f,j)=>{
const preview=f.length>40?f.substring(0,40)+'...':f;
const isEmpty=f.trim()==='';
debug+=`  字段${j}: ${isEmpty?'[空]':JSON.stringify(preview)}\n`;
});
debug+='\n';
}

debug+='═══════════════════════════════════\n';
debug+='【推断的列映射】\n';

// Now do the actual parsing with smart column detection
const firstDataFields=lines.length>startIdx?lines[startIdx].split('\t'):[];
let colMap={type:0,idx:1,qTime:2,refTime:-1,question:-1,answer:-1,explanation:-1};

// Determine column positions based on actual field count
const fieldCount=firstDataFields.length;

if(fieldCount>=7){
// 7+ columns: standard layout
colMap.type=0;colMap.idx=1;colMap.qTime=2;colMap.refTime=3;
colMap.question=4;colMap.answer=5;colMap.explanation=6;
debug+=`检测到 ${fieldCount} 列 → 标准布局: 类型(0) 序号(1) 提问(2) 参考(3) 问题(4) 答案(5) 解析(6+)\n`;
} else if(fieldCount===6){
// 6 columns: one column is missing, figure out which
// Check if field[3] looks like a time or a question
if(isTime(firstDataFields[3])){
// Has refTime, missing something else
colMap.type=0;colMap.idx=1;colMap.qTime=2;colMap.refTime=3;
colMap.question=4;colMap.answer=5;
debug+=`检测到 6 列，字段3是时间 → 缺少"解析"列\n`;
} else if(firstDataFields[3].length>5){
// Field 3 is likely the question (long text), refTime is missing
colMap.type=0;colMap.idx=1;colMap.qTime=2;
colMap.question=3;colMap.answer=4;colMap.explanation=5;
debug+=`检测到 6 列，字段3是长文本 → 缺少"回答参考时间"列\n`;
debug+=`  列映射: 类型(0) 序号(1) 提问(2) 问题(3) 答案(4) 解析(5)\n`;
} else {
// Ambiguous, try to detect by content
colMap.type=0;colMap.idx=1;colMap.qTime=2;
colMap.question=3;colMap.answer=4;colMap.explanation=5;
debug+=`检测到 6 列，使用默认映射: 类型(0) 序号(1) 提问(2) 问题(3) 答案(4) 解析(5)\n`;
}
} else if(fieldCount===5){
colMap.type=0;colMap.idx=1;colMap.qTime=2;colMap.question=3;colMap.answer=4;
debug+=`检测到 5 列 → 缺少"回答参考时间"和"解析"\n`;
}

debug+='\n';

// Parse all rows
const typeLabels={a:'A-实时多模态感知',b:'B-历史回顾',d:'D-工具调用',e:'E-主动交互'};
let qaList=[];

for(let i=startIdx;i<lines.length;i++){
const fields=lines[i].split('\t');
if(fields.length<3)continue;

let type='',idx='',qTime='',refTime='',question='',answer='',explanation='';

if(colMap.type>=0&&colMap.type<fields.length)type=fields[colMap.type]?.trim().toLowerCase()||'';
if(colMap.idx>=0&&colMap.idx<fields.length)idx=fields[colMap.idx]?.trim()||'';
if(colMap.qTime>=0&&colMap.qTime<fields.length)qTime=fields[colMap.qTime]?.trim()||'';
if(colMap.refTime>=0&&colMap.refTime<fields.length)refTime=fields[colMap.refTime]?.trim()||'';
if(colMap.question>=0&&colMap.question<fields.length)question=fields[colMap.question]?.trim()||'';
if(colMap.answer>=0&&colMap.answer<fields.length)answer=fields[colMap.answer]?.trim()||'';
if(colMap.explanation>=0){
explanation=fields.slice(colMap.explanation).join('\t').trim();
}

if(!question)continue;
qaList.push({type,idx,qTime,refTime,question,answer,explanation});
}

// Build output
let output=`【视频标注 QA 数据】共 ${qaList.length} 题\n\n`;
qaList.forEach((qa,i)=>{
output+=`--- 第 ${qa.idx||i+1} 题 [${typeLabels[qa.type]||'未知'}] ---\n`;
output+=`提问时间：${qa.qTime||'未填写'}\n`;
if(qa.refTime)output+=`回答参考时间：${qa.refTime}\n`;
output+=`问题：${qa.question}\n`;
output+=`答案：${qa.answer}\n`;
if(qa.explanation)output+=`解析：${qa.explanation}\n`;
output+=`\n`;
});

const tc={a:0,b:0,d:0,e:0};
qaList.forEach(q=>{if(tc[q.type]!==undefined)tc[q.type]++;});
output+=`--- 统计 ---\nA:${tc.a} B:${tc.b} D:${tc.d} E:${tc.e}\n`;

// Render
const resultArea=document.getElementById('resultArea');
resultArea.innerHTML=`
<div class="debug-box">${esc(debug)}</div>
<div class="output-box" id="outputText">${esc(output)}</div>
<div class="btn-group"><button class="btn btn-primary" onclick="copyOutput()">📋 复制结果</button></div>
`;
}

function copyOutput(){
const t=document.getElementById('outputText').innerText;
navigator.clipboard.writeText(t).then(()=>{
const b=document.querySelector('.btn-group .btn-primary');
const o=b.innerHTML;b.innerHTML='✅ 已复制';setTimeout(()=>b.innerHTML=o,2000);
});
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
</body>
</html>
